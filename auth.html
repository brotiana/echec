<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription - Échecs en Ligne</title>
    <meta name="description" content="Connectez-vous ou créez un compte pour jouer aux échecs en ligne.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/icons.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card card">
            <div class="text-center mb-3">
                <a href="index.html" class="logo" style="justify-content: center;">
                    <span class="logo-icon" id="logo-icon"></span>
                    <span>Échecs Online</span>
                </a>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
                <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Nom d'utilisateur ou Email</label>
                    <input type="text" class="form-input" id="login-username" placeholder="Entrez votre identifiant"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="login-password"
                        placeholder="Entrez votre mot de passe" required>
                </div>

                <div id="login-error" class="form-error" style="display: none;"></div>

                <button type="submit" class="btn btn-primary w-full" id="login-btn">
                    Se connecter
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="photo-upload">
                    <img src="uploads/profiles/default.png" alt="Photo de profil" class="photo-preview"
                        id="photo-preview">
                    <label class="photo-label" for="photo-input">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                            height="18" style="vertical-align: middle; margin-right: 4px;">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        Choisir une photo
                    </label>
                    <input type="file" id="photo-input" class="photo-input" accept="image/*"
                        onchange="previewPhoto(this)">
                </div>

                <div class="form-group">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" class="form-input" id="register-username" placeholder="Choisissez un pseudo"
                        required pattern="[a-zA-Z0-9_]+" minlength="3" maxlength="50">
                    <small class="text-muted">Lettres, chiffres et underscores uniquement</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="register-email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="register-password" placeholder="Minimum 10 caractères"
                        required minlength="10">
                    <div class="password-strength" id="password-strength"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" class="form-input" id="register-confirm"
                        placeholder="Confirmez votre mot de passe" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Bio (optionnel)</label>
                    <textarea class="form-textarea" id="register-bio" placeholder="Parlez-nous de vous..."
                        rows="3"></textarea>
                </div>

                <div id="register-error" class="form-error" style="display: none;"></div>

                <button type="submit" class="btn btn-primary w-full" id="register-btn">
                    Créer mon compte
                </button>
            </form>

            <p class="text-center mt-3 text-muted">
                <a href="index.html">← Retour à l'accueil</a>
            </p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/icons.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Switch Tab
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Vérifier le hash pour l'onglet par défaut
        if (window.location.hash === '#register') {
            switchTab('register');
        }

        // Preview Photo
        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('photo-preview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Password Strength Indicator
        document.getElementById('register-password').addEventListener('input', function (e) {
            const password = e.target.value;
            const strength = document.getElementById('password-strength');

            if (password.length === 0) {
                strength.innerHTML = '';
                return;
            }

            let score = 0;
            if (password.length >= 10) score++;
            if (password.length >= 14) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            let color, text;
            if (password.length < 10) {
                color = 'var(--danger)';
                text = `Minimum 10 caractères (${password.length}/10)`;
            } else if (score < 3) {
                color = 'var(--warning)';
                text = 'Mot de passe faible';
            } else if (score < 5) {
                color = 'var(--success)';
                text = 'Mot de passe correct';
            } else {
                color = 'var(--primary)';
                text = 'Mot de passe fort';
            }

            strength.innerHTML = `<small style="color: ${color};">${text}</small>`;
        });

        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Connexion en cours...';
            errorDiv.style.display = 'none';

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Connexion réussie!', 'success');

                    // Rediriger vers la page précédente ou l'accueil
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    setTimeout(() => {
                        window.location.href = redirect || 'index.html';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'Erreur de connexion';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Erreur de connexion au serveur';
                errorDiv.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'Se connecter';
        }

        // Handle Register
        async function handleRegister(e) {
            e.preventDefault();

            const btn = document.getElementById('register-btn');
            const errorDiv = document.getElementById('register-error');

            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            // Validation
            if (password.length < 10) {
                errorDiv.textContent = 'Le mot de passe doit contenir au moins 10 caractères';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                errorDiv.textContent = 'Les mots de passe ne correspondent pas';
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Création en cours...';
            errorDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('username', document.getElementById('register-username').value);
            formData.append('email', document.getElementById('register-email').value);
            formData.append('password', password);
            formData.append('bio', document.getElementById('register-bio').value);

            const photoInput = document.getElementById('photo-input');
            if (photoInput.files[0]) {
                formData.append('profile_photo', photoInput.files[0]);
            }

            try {
                const response = await fetch('register.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('session_token', data.session_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Compte créé avec succès!', 'success');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    const errors = data.errors ? data.errors.join('<br>') : data.error;
                    errorDiv.innerHTML = errors || 'Erreur lors de l\'inscription';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Erreur de connexion au serveur';
                errorDiv.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'Créer mon compte';
        }

        // Vérifier si déjà connecté
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize logo icon
            document.getElementById('logo-icon').innerHTML = Icons.chessPawn;

            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>

    <style>
        .logo-icon {
            display: inline-flex;
            width: 32px;
            height: 32px;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--primary);
        }
    </style>
</body>

</html>
