<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joueurs en Ligne - Échecs en Ligne</title>
    <meta name="description" content="Trouvez des joueurs en ligne et invitez-les à une partie d'échecs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/icons.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon" id="logo-icon"></span>
                <span>Échecs Online</span>
            </a>

            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon" id="icon-home"></span> Accueil
                </a>
                <a href="users.html" class="nav-link active">
                    <span class="nav-icon" id="icon-users"></span> Joueurs
                </a>
                <a href="profile.html" class="nav-link">
                    <span class="nav-icon" id="icon-profile"></span> Profil
                </a>
            </div>

            <div class="nav-user" id="nav-user-section"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="users-container">
            <!-- Users List -->
            <div>
                <div class="card mb-3">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" width="20" height="20">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            Rechercher un joueur
                        </h3>
                    </div>
                    <input type="text" class="form-input" id="search-input"
                        placeholder="Rechercher par nom d'utilisateur..." oninput="searchUsers(this.value)">
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <span class="status-dot online"></span>
                            Joueurs en ligne
                        </h3>
                        <span class="text-muted" id="online-count">0 joueurs</span>
                    </div>
                    <div class="users-list" id="users-list">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- Mes invitations envoyées -->
                <div class="card mt-3" id="sent-invitations-card" style="display: none;">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" width="20" height="20">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                            Invitations envoyées
                        </h3>
                    </div>
                    <div id="sent-invitations"></div>
                </div>

                <!-- Mes invitations reçues -->
                <div class="card mt-3" id="received-invitations-card" style="display: none;">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" width="20" height="20">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Invitations reçues
                        </h3>
                    </div>
                    <div id="received-invitations"></div>
                </div>
            </div>

            <!-- Conversation Panel -->
            <div class="conversation-panel" id="conversation-panel">
                <div class="conversation-header" id="conversation-header" style="display: none;">
                    <button class="btn btn-ghost btn-sm mobile-only" onclick="closeConversationPanel()"
                        style="margin-right: auto; padding: 4px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"
                            height="20">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <img src="uploads/profiles/default.png" alt="User" class="user-avatar" id="conv-avatar">
                    <div style="flex: 1;">
                        <div class="user-name" id="conv-username">Sélectionnez un utilisateur</div>
                        <div class="user-status">
                            <span class="status-dot" id="conv-status-dot"></span>
                            <span id="conv-status-text"></span>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm" id="conv-invite-btn" onclick="inviteFromConversation()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <line x1="6" y1="12" x2="10" y2="12"></line>
                            <line x1="8" y1="10" x2="8" y2="14"></line>
                            <line x1="15" y1="13" x2="15.01" y2="13"></line>
                            <line x1="18" y1="11" x2="18.01" y2="11"></line>
                            <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                        </svg>
                        Inviter
                    </button>
                </div>

                <div class="conversation-messages" id="conversation-messages">
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48"
                                height="48">
                                <path
                                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                                </path>
                            </svg>
                        </div>
                        <p>Cliquez sur un utilisateur pour voir vos messages</p>
                    </div>
                </div>

                <div class="chat-input-area" id="conv-input-area" style="display: none;">
                    <input type="text" class="chat-input" id="conv-input" placeholder="Écrivez un message..."
                        onkeypress="if(event.key==='Enter') sendPrivateMessage()">
                    <button class="btn btn-primary btn-icon" onclick="sendPrivateMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                            height="18">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Invitations Panel -->
    <div class="invitations-panel" id="invitations-panel"></div>

    <script src="js/icons.js"></script>
    <script src="js/app.js"></script>
    <script>
        let selectedUserId = null;
        let lastPrivateMessageId = 0;
        let privateMessageInterval = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize icons
            document.getElementById('logo-icon').innerHTML = Icons.chessPawn;
            document.getElementById('icon-home').innerHTML = Icons.home;
            document.getElementById('icon-users').innerHTML = Icons.users;
            document.getElementById('icon-profile').innerHTML = Icons.user;

            await initApp();

            if (!currentUser) {
                showToast('Connectez-vous pour voir les joueurs', 'warning');
                setTimeout(() => {
                    window.location.href = 'auth.html?redirect=users.html';
                }, 2000);
                return;
            }

            loadActiveUsers();
            loadInvitations();

            // Rafraîchir périodiquement
            setInterval(loadActiveUsers, 30000);
            setInterval(loadInvitations, 10000);
        });

        async function loadActiveUsers() {
            try {
                const response = await fetch('api/users.php?action=active');
                const data = await response.json();

                const container = document.getElementById('users-list');
                const countSpan = document.getElementById('online-count');

                if (data.success && data.users.length > 0) {
                    countSpan.textContent = `${data.users.length} joueur${data.users.length > 1 ? 's' : ''}`;
                    container.innerHTML = data.users.map(user => createUserCard(user)).join('');
                } else {
                    countSpan.textContent = '0 joueurs';
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                            </div>
                            <p>Aucun joueur en ligne</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        function createUserCard(user) {
            const winRate = (user.wins + user.losses + user.draws) > 0
                ? Math.round((user.wins / (user.wins + user.losses + user.draws)) * 100)
                : 0;

            return `
                <div class="user-card card" onclick="selectUser(${user.id}, '${user.username}', '${user.profile_photo || 'default.png'}', ${user.is_online})">
                    <img src="uploads/profiles/${user.profile_photo || 'default.png'}" 
                         alt="${user.username}" class="user-avatar">
                    <div class="user-info">
                        <div class="user-name">${user.username}</div>
                        <div class="user-stats">
                            ${user.wins}V / ${user.losses}D / ${user.draws}N • ${winRate}% victoires
                        </div>
                    </div>
                    <div class="user-status">
                        <span class="status-dot ${user.is_online ? 'online' : ''}"></span>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); inviteUser(${user.id}, '${user.username}')">
                        Inviter
                    </button>
                </div>
            `;
        }

        async function searchUsers(query) {
            if (query.length < 2) {
                loadActiveUsers();
                return;
            }

            try {
                const response = await fetch(`api/users.php?action=search&q=${encodeURIComponent(query)}`);
                const data = await response.json();

                const container = document.getElementById('users-list');

                if (data.success && data.users.length > 0) {
                    container.innerHTML = data.users.map(user => createUserCard(user)).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>Aucun résultat pour "${query}"</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        async function inviteUser(userId, username) {
            try {
                const response = await fetch('api/users.php?action=invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ receiver_id: userId })
                });

                const data = await response.json();

                if (data.success && data.game_id) {
                    showToast(data.message, 'success');
                    // Rediriger vers la page de jeu immédiatement
                    setTimeout(() => {
                        window.location.href = `game.html?id=${data.game_id}`;
                    }, 1000);
                } else {
                    showToast(data.message || data.error, data.success ? 'success' : 'error');
                    if (data.success) {
                        loadInvitations();
                    }
                }
            } catch (error) {
                showToast('Erreur d\'envoi', 'error');
            }
        }

        async function loadInvitations() {
            // Invitations reçues
            try {
                const received = await fetch('api/users.php?action=invitations&type=received');
                const dataReceived = await received.json();

                const cardReceived = document.getElementById('received-invitations-card');
                const containerReceived = document.getElementById('received-invitations');

                if (dataReceived.success && dataReceived.invitations.length > 0) {
                    cardReceived.style.display = 'block';
                    containerReceived.innerHTML = dataReceived.invitations.map(inv => `
                        <div class="user-card card">
                            <img src="uploads/profiles/${inv.sender_photo || 'default.png'}" 
                                 alt="${inv.sender_username}" class="user-avatar">
                            <div class="user-info">
                                <div class="user-name">${inv.sender_username}</div>
                                <div class="user-stats">${inv.sender_wins}V / ${inv.sender_losses}D</div>
                            </div>
                            <div class="invitation-actions">
                                <button class="btn btn-danger btn-sm" onclick="respondInvitation(${inv.id}, false)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>
                                <button class="btn btn-success btn-sm" onclick="respondInvitation(${inv.id}, true)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                    Jouer
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    cardReceived.style.display = 'none';
                }

                // Invitations envoyées
                const sent = await fetch('api/users.php?action=invitations&type=sent');
                const dataSent = await sent.json();

                const cardSent = document.getElementById('sent-invitations-card');
                const containerSent = document.getElementById('sent-invitations');

                if (dataSent.success && dataSent.invitations.length > 0) {
                    cardSent.style.display = 'block';
                    containerSent.innerHTML = dataSent.invitations.map(inv => `
                        <div class="user-card card">
                            <img src="uploads/profiles/${inv.receiver_photo || 'default.png'}" 
                                 alt="${inv.receiver_username}" class="user-avatar">
                            <div class="user-info">
                                <div class="user-name">${inv.receiver_username}</div>
                                <div class="text-muted">En attente de réponse...</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    cardSent.style.display = 'none';
                }

            } catch (error) {
                console.error('Error loading invitations:', error);
            }
        }

        async function respondInvitation(invitationId, accept) {
            try {
                const response = await fetch('api/users.php?action=respond_invitation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invitation_id: invitationId, accept: accept })
                });

                const data = await response.json();
                showToast(data.message, data.success ? 'success' : 'error');

                if (data.success && accept && data.game_id) {
                    // Rediriger vers la partie
                    window.location.href = `game.html?id=${data.game_id}`;
                } else {
                    loadInvitations();
                }
            } catch (error) {
                showToast('Erreur', 'error');
            }
        }

        // Sélectionner un utilisateur pour voir la conversation
        function selectUser(userId, username, photo, isOnline) {
            selectedUserId = userId;
            lastPrivateMessageId = 0;

            // Mettre à jour l'en-tête
            const panel = document.getElementById('conversation-panel');
            const header = document.getElementById('conversation-header');
            const inputArea = document.getElementById('conv-input-area');

            // Show panel on mobile
            if (window.innerWidth <= 1024) {
                panel.style.display = 'flex';
            }

            header.style.display = 'flex';
            inputArea.style.display = 'flex';

            document.getElementById('conv-avatar').src = `uploads/profiles/${photo}`;
            document.getElementById('conv-username').textContent = username;
            document.getElementById('conv-status-dot').className = `status-dot ${isOnline ? 'online' : ''}`;
            document.getElementById('conv-status-text').textContent = isOnline ? 'En ligne' : 'Hors ligne';
            document.getElementById('conv-invite-btn').onclick = () => inviteUser(userId, username);

            // Charger les messages
            loadPrivateMessages();

            // Démarrer le polling des messages
            if (privateMessageInterval) {
                clearInterval(privateMessageInterval);
            }
            privateMessageInterval = setInterval(loadPrivateMessages, 3000);
        }

        function closeConversationPanel() {
            selectedUserId = null;
            const panel = document.getElementById('conversation-panel');
            if (window.innerWidth <= 1024) {
                panel.style.display = 'none';
            }

            if (privateMessageInterval) {
                clearInterval(privateMessageInterval);
                privateMessageInterval = null;
            }
        }

        async function loadPrivateMessages() {
            if (!selectedUserId) return;

            try {
                const response = await fetch(
                    `api/chat.php?action=get_private_messages&user_id=${selectedUserId}&last_id=${lastPrivateMessageId}`
                );
                const data = await response.json();

                const container = document.getElementById('conversation-messages');

                if (lastPrivateMessageId === 0) {
                    // Premier chargement - remplacer tout
                    if (data.success && data.messages.length > 0) {
                        container.innerHTML = data.messages.map(msg => createMessageHtml(msg)).join('');
                    } else {
                        container.innerHTML = `
                            <div class="empty-state">
                                <p class="text-muted">Aucun message. Commencez la conversation!</p>
                            </div>
                        `;
                    }
                } else if (data.success && data.messages.length > 0) {
                    // Ajouter les nouveaux messages
                    const emptyState = container.querySelector('.empty-state');
                    if (emptyState) emptyState.remove();

                    data.messages.forEach(msg => {
                        container.innerHTML += createMessageHtml(msg);
                    });
                }

                if (data.messages && data.messages.length > 0) {
                    lastPrivateMessageId = Math.max(...data.messages.map(m => m.id));
                    container.scrollTop = container.scrollHeight;
                }

            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function createMessageHtml(msg) {
            const isOwn = currentUser && msg.sender_id == currentUser.id;
            return `
                <div class="chat-message ${isOwn ? 'own' : ''}">
                    <img src="uploads/profiles/${msg.sender_photo || 'default.png'}" 
                         alt="${msg.sender_username}" class="message-avatar">
                    <div class="message-content">
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${formatTime(msg.created_at)}</div>
                    </div>
                </div>
            `;
        }

        async function sendPrivateMessage() {
            const input = document.getElementById('conv-input');
            const content = input.value.trim();

            if (!content || !selectedUserId) return;

            input.value = '';

            try {
                await fetch('api/chat.php?action=send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiver_id: selectedUserId,
                        content: content
                    })
                });

                // Recharger immédiatement
                loadPrivateMessages();
            } catch (error) {
                showToast('Erreur d\'envoi', 'error');
            }
        }

        function inviteFromConversation() {
            if (selectedUserId) {
                inviteUser(selectedUserId, document.getElementById('conv-username').textContent);
            }
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) {
                return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            } else if (diffDays === 1) {
                return 'Hier';
            } else {
                return date.toLocaleDateString('fr-FR');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (privateMessageInterval) {
                clearInterval(privateMessageInterval);
            }
        });
    </script>

    <style>
        /* Navigation icons */
        .nav-icon {
            display: inline-flex;
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 4px;
        }

        .nav-icon svg {
            width: 100%;
            height: 100%;
        }

        /* Logo icon */
        .logo-icon {
            display: inline-flex;
            width: 32px;
            height: 32px;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--primary);
        }

        /* Card title icon */
        .card-icon {
            vertical-align: middle;
            margin-right: 8px;
        }

        /* Empty icon */
        .empty-icon {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
    </style>
</body>

</html>
